<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(555, 70)">
    <rect x="0" y="0" width="230" height="40" rx="6" fill="#21262d" stroke="#1f6feb" stroke-width="1.5"/>
    <!-- filled portion -->
    <rect x="2" y="2" width="160" height="36" rx="5" fill="#1f6feb" fill-opacity="0.35">
      <animate attributeName="width" values="160;200;140;160" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="115" y="26" fill="#f0f6fc" font-family="monospace" font-size="11" text-anchor="middle">context window</text>
    <text x="115" y="60" fill="#1f6feb" font-family="monospace" font-size="10" text-anchor="middle">4096 / 8192 tokens</text>
    <!-- truncation marker -->
    <line x1="162" y1="50" x2="162" y2="70" stroke="#f85149" stroke-width="2" stroke-dasharray="3">
      <animate attributeName="x1" values="162;202;142;162" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="162;202;142;162" dur="4s" repeatCount="indefinite"/>
    </line>
    <text x="162" y="80" fill="#f85149" font-family="monospace" font-size="9" text-anchor="middle">trim</text>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-context-window</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Context window management for LLM agents — token counting, sliding windo...</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="86" y="220" width="120" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="146" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Token Budget</text>
    <rect x="218" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="286" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Window Sliding</text>
    <rect x="366" y="220" width="176" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="454" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Priority Truncation</text>
    <rect x="554" y="220" width="160" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="634" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Summary Injection</text>
</svg>